// ================= 玩家档案管理 =================
async function loadPlayerProfile(userId, email) {
  const { data, error } = await supabase.from('player_profiles').select('*').eq('user_id', userId).single();
  if (error || !data) {
    const nicknameInput = document.getElementById('nicknameInput');
    const nickname = nicknameInput ? nicknameInput.value.trim() : email.split('@')[0];
    const isAdminUser = (email === ADMIN_EMAIL);
    const finalNickname = isAdminUser ? '陈家乐' : (nickname || email.split('@')[0]);
    const newProfile = {
      user_id: userId,
      email: email,
      nickname: finalNickname,
      level: isAdminUser ? 99 : 1,
      exp: isAdminUser ? 99999 : 0,
      coins: isAdminUser ? 999999 : 200,
      energy: 10,
      equipCarried: [],
      unlockedEquip: isAdminUser ? Object.fromEntries(allEquipments.map(e => [e.id, true])) : {1:true},
      totalTrainings: 0,
      energyNeverLow: true,
      hasJoinedTeam: false,
      calmToneCount: 0,
      quickResponse: false,
      items: isAdminUser ? { energy:99, permit_temp:99, double_exp:99 } : {},
      history: [],
      lastEnergyDate: new Date().toDateString()
    };
    await supabase.from('player_profiles').insert(newProfile);
    player = newProfile;
  } else {
    player = data;
    if (email === ADMIN_EMAIL && player.level < 99) {
      player.level = 99; player.exp = 99999; player.coins = 999999;
      player.unlockedEquip = Object.fromEntries(allEquipments.map(e => [e.id, true]));
      player.items = { energy:99, permit_temp:99, double_exp:99 };
      await savePlayerProfile();
    }
  }
}

async function savePlayerProfile() {
  if (!player?.user_id) return;
  await supabase.from('player_profiles').upsert({
    user_id: player.user_id,
    email: player.email,
    nickname: player.nickname,
    level: player.level,
    exp: player.exp,
    coins: player.coins,
    energy: player.energy,
    equipCarried: player.equipCarried || [],
    unlockedEquip: player.unlockedEquip || {1:true},
    totalTrainings: player.totalTrainings || 0,
    energyNeverLow: player.energyNeverLow,
    hasJoinedTeam: player.hasJoinedTeam,
    calmToneCount: player.calmToneCount || 0,
    quickResponse: player.quickResponse || false,
    items: player.items || {},
    history: player.history || [],
    lastEnergyDate: player.lastEnergyDate
  }, { onConflict: 'user_id' });
}

// ================= 登录注册 =================
document.getElementById('registerBtn').onclick = async () => {
  const nickname = document.getElementById('nicknameInput').value.trim();
  const email = document.getElementById('emailInput').value.trim();
  const pwd = document.getElementById('passwordInput').value;
  if (!nickname) return alert('请输入昵称');
  if (!email) return alert('请输入邮箱');
  if (pwd.length < 6) return alert('密码至少6位');
  const { data, error } = await supabase.auth.signUp({ email, password: pwd });
  if (error) return document.getElementById('authError').textContent = '注册失败：' + error.message;
  if (data.user) {
    await loadPlayerProfile(data.user.id, email);
    alert('注册成功！已自动登录');
    onLoginSuccess(email);
  } else {
    alert('注册成功，请登录（如已关闭邮箱验证可直接登录）');
  }
};

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('emailInput').value.trim();
  const pwd = document.getElementById('passwordInput').value;
  if (!email) return alert('请输入邮箱');
  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
  if (error) return document.getElementById('authError').textContent = '登录失败：' + error.message;
  await loadPlayerProfile(data.user.id, email);
  onLoginSuccess(email);
};

function onLoginSuccess(email) {
  isAdmin = (email === ADMIN_EMAIL);
  document.getElementById('adminBtn').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('adminCoverBtn').style.display = isAdmin ? 'inline-block' : 'none';
  showCover();
}

document.getElementById('logoutBtn').onclick = async () => {
  await supabase.auth.signOut();
  player = null; isAdmin = false;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('authView').classList.add('active');
  document.getElementById('adminBtn').style.display = 'none';
  document.getElementById('adminCoverBtn').style.display = 'none';
};

(async () => {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      await loadPlayerProfile(session.user.id, session.user.email);

    }
  } catch (e) {
    console.warn('自动登录失败（可能因file协议）:', e);

// ================= 界面更新 =================
function checkEnergyReset() {
  const today = new Date().toDateString();
  if (player.lastEnergyDate !== today) {
    player.energy = 10;
    player.lastEnergyDate = today;
    savePlayerProfile();
  }
}

function showCover() {
  document.getElementById('authView').classList.remove('active');
  document.getElementById('coverView').classList.add('active');
  checkEnergyReset();
  renderSceneGrid();
  updateCoverUI();
}

function updateCoverUI() {
  if (!player) return;
  document.getElementById('displayNickname').textContent = player.nickname;
  document.getElementById('displayLevel').textContent = player.level;
  document.getElementById('displayCoins').textContent = player.coins;
  document.getElementById('displayEnergy').textContent = player.energy;
  let title = '见习警员';
  for (let t of titleDefs) if (player.level >= t.minLevel) title = t.name;
  document.getElementById('displayTitle').textContent = title;
  const achieved = achievementDefs.filter(a => a.check(player)).length;
  document.getElementById('displayAchieve').textContent = achieved;
}

function renderSceneGrid() {
  document.getElementById('sceneGrid').innerHTML = `<div class="scene-card" onclick="startScene('delay')">
      <span>✈️</span> 航班延误纠纷 (初级)

// ================= 装备/商店/组队 =================
document.getElementById('equipMenuBtn').onclick = () => {
  const max = Math.floor(player.level/5)+3;
  document.getElementById('maxCarry').textContent = max;
  const list = document.getElementById('equipList');
  list.innerHTML = '';
  allEquipments.forEach(eq => {
    if (player.unlockedEquip[eq.id]) {
      const checked = (player.equipCarried||[]).includes(eq.id) ? 'checked' : '';
      const div = document.createElement('div');
      div.className = 'equip-item';
      div.innerHTML = `<label><input type="checkbox" value="${eq.id}" ${checked}> ${eq.icon} ${eq.name} - ${eq.desc}</label>`;
      list.appendChild(div);
    }
  });
  document.getElementById('equipModal').style.display = 'flex';
};
document.getElementById('confirmEquip').onclick = () => {
  const checks = [...document.querySelectorAll('#equipList input:checked')].map(cb => +cb.value);
  const max = +document.getElementById('maxCarry').textContent;
  if (checks.length > max) return alert(`最多携带${max}件`);
  player.equipCarried = checks;
  savePlayerProfile();
  document.getElementById('equipModal').style.display = 'none';
  alert('装备已更新');
};

document.getElementById('shopBtn').onclick = () => {
  const list = document.getElementById('shopList');
  list.innerHTML = '';
  shopItems.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'btn'; btn.style.display='block'; btn.style.width='100%';
    btn.textContent = `${item.name} (${item.price}💰) - ${item.desc}`;
    btn.onclick = () => {
      if (player.coins < item.price) return alert('金币不足');
      player.coins -= item.price;
      player.items[item.id] = (player.items[item.id]||0) + 1;
      savePlayerProfile();
      updateCoverUI();
      alert(`购买成功！获得 ${item.name} ×1`);
    };
    list.appendChild(btn);
  });
  document.getElementById('shopModal').style.display = 'flex';
};

document.getElementById('teamBtn').onclick = () => document.getElementById('teamModal').style.display = 'flex';
document.getElementById('createRoomBtn').onclick = () => {
  const code = Math.random().toString(36).substr(2,6).toUpperCase();
  const room = { code, host:player.nickname, members:[player.nickname] };
  localStorage.setItem('room_'+code, JSON.stringify(room));
  currentRoom = room;
  document.getElementById('roomCodeDisplay').textContent = '房间码：' + code;
  updateRoomMembers();
};
document.getElementById('joinRoomBtn').onclick = () => {
  const code = document.getElementById('joinRoomInput').value.trim().toUpperCase();
  const roomData = JSON.parse(localStorage.getItem('room_'+code) || 'null');
  if (!roomData) return alert('房间不存在');
  if (!roomData.members.includes(player.nickname)) {
    roomData.members.push(player.nickname);
    localStorage.setItem('room_'+code, JSON.stringify(roomData));
    player.hasJoinedTeam = true;
    savePlayerProfile();
    alert('加入成功！');
    currentRoom = roomData;
    updateRoomMembers();
  }
};
function updateRoomMembers() {
  const div = document.getElementById('roomMembers');
  if (currentRoom) div.innerHTML = '<p>当前成员：</p>' + currentRoom.members.map(m => `<p>👤 ${m}</p>`).join('');
}

// ================= 训练场景 =================
let currentScene = null, currentNode = 'e1';
let trainingActive = false, scores = [], doubleExpActive = false, toneMetrics = [];

function startScene(id) {
  if (player.energy < 1) return alert('精力不足！');
  player.energy--;
  if (player.energy < 5) player.energyNeverLow = false;
  if (player.items.double_exp > 0) { doubleExpActive = true; player.items.double_exp--; }
  else { doubleExpActive = false; }
  player.totalTrainings++;
  savePlayerProfile();
  currentScene = sceneData;
  currentNode = 'e1';
  scores = []; toneMetrics = [];
  trainingActive = true;
  document.getElementById('coverView').classList.remove('active');
  document.getElementById('trainView').classList.add('active');
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('scorePanel').classList.remove('show');
  processNode(currentNode);
}

function processNode(id) {
  const node = currentScene.easy.nodes[id];
  if (!node) return;
  appendMessage('ai', node.ai);
  if (node.isEnd) { finishTraining(node.ending); return; }
  if (node.choices) {
    const div = document.createElement('div');
    div.style.display = 'flex'; div.style.flexWrap = 'wrap'; div.style.gap = '5px';
    node.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'btn'; btn.textContent = c.text;
      btn.onclick = () => {
        appendMessage('user', c.text);
        scores.push({ dims: c.weights || {} });
        processNode(c.next);
      };
      div.appendChild(btn);
    });
    document.getElementById('chatArea').appendChild(div);
  }
}

function appendMessage(type, text) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.textContent = text;
  document.getElementById('chatArea').appendChild(div);
  document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
}

async function finishTraining(ending) {
  trainingActive = false;
  const baseScore = ending === 'good' ? 80 : 40;
  let expMul = doubleExpActive ? 2 : 1;
  const expGain = Math.floor(baseScore * 0.5 * expMul);
  const coinsGain = Math.floor(baseScore / 10);
  player.exp += expGain;
  player.coins += coinsGain;
  while (player.exp >= player.level * 100 && player.level < 99) {
    player.exp -= player.level * 100;
    player.level++;
  }
  player.history.push({
    scene:'航班延误', ending, score:baseScore, expGain, coinsGain,
    time: new Date().toLocaleString()
  });
  await supabase.from('training_reports').insert({
    user_id: player.user_id,
    officer_name: player.nickname,
    category: 'dispatch',
    scene_id: 'delay',
    total_score: baseScore,
    ending: ending,
    difficulty: 'easy',
    tone_analyzed: toneMetrics.length > 0
  });
  savePlayerProfile();
  checkAchievements();
  updateCoverUI();
  const panel = document.getElementById('scorePanel');
  panel.innerHTML = `<h3>${ending==='good'?'✅ 成功':'❌ 失败'}</h3>
    <p>得分：${baseScore} | 经验+${expGain} | 金币+${coinsGain}${doubleExpActive?' (双倍)':''}</p>
    <button class="btn" onclick="backToMenu()">返回大厅</button>`;
  panel.classList.add('show');
}

function backToMenu() {
  document.getElementById('trainView').classList.remove('active');
  document.getElementById('coverView').classList.add('active');
  document.getElementById('scorePanel').classList.remove('show');
  updateCoverUI();
}

document.getElementById('backBtn').onclick = backToMenu;
document.getElementById('sendBtn').onclick = () => {
  const input = document.getElementById('userInput');
  if (input.value.trim()) {
    appendMessage('user', input.value.trim());
    input.value = '';
    processNode('end_good');
  }
};

// ================= 语音与语气 =================
document.getElementById('voiceBtn').onclick = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return alert('语音识别仅支持Chrome/Edge');
  startAudioListening();
  const rec = new SR(); rec.lang = 'zh-CN';
  rec.onresult = e => {
    document.getElementById('userInput').value = e.results[0][0].transcript;
    const tone = analyzeTone();
    stopAudioListening();
    if (tone.level !== 'neutral') appendMessage('system', `🎙️ 语气：${tone.label}`);
    player.calmToneCount += (tone.level === 'calm' ? 1 : 0);
    savePlayerProfile();
    sendMessage();
  };
  rec.start();
};

let audioContext, audioAnalyser, audioStream, isRecording = false;
async function startAudioListening() {
  if (isRecording) return;
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(audioStream);
    audioAnalyser = audioContext.createAnalyser();
    audioAnalyser.fftSize = 256;
    source.connect(audioAnalyser);
    toneMetrics = [];
    isRecording = true;
    const collect = () => {
      if (!isRecording || !audioAnalyser) return;
      const data = new Uint8Array(audioAnalyser.frequencyBinCount);
      audioAnalyser.getByteFrequencyData(data);
      toneMetrics.push(Math.sqrt(data.reduce((s,v)=>s+v*v,0)/data.length)/255);
      if (toneMetrics.length > 200) toneMetrics.shift();
      requestAnimationFrame(collect);
    };
    collect();
  } catch (e) { console.log('麦克风不可用', e); }
}

function stopAudioListening() {
  isRecording = false;
  if (audioStream) { audioStream.getTracks().forEach(t=>t.stop()); audioStream = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  audioAnalyser = null;
}

function analyzeTone() {
  if (!toneMetrics.length) return { level:'neutral', label:'正常', penalty:0 };
  const avg = toneMetrics.reduce((a,b)=>a+b,0)/toneMetrics.length;
  const variance = toneMetrics.reduce((s,v)=>s+(v-avg)**2,0)/toneMetrics.length;
  const std = Math.sqrt(variance);
  if (avg > 0.6 && std > 0.25) return { level:'harsh', label:'语气过重生硬', penalty:-3 };
  if (avg > 0.5 && std > 0.2) return { level:'harsh', label:'语气偏激动', penalty:-2 };
  if (avg < 0.25 && std < 0.1) return { level:'calm', label:'语气平稳专业', penalty:2 };
  return { level:'neutral', label:'语气正常', penalty:0 };
}

// ================= 成就检测 =================
function checkAchievements() {
  achievementDefs.forEach(a => {
    if (a.check(player) && !player['ach_'+a.id]) {
      player['ach_'+a.id] = true;
      player.coins += a.rewardCoins;
      savePlayerProfile();
      alert(`🏆 成就解锁：${a.name}！奖励 ${a.rewardCoins} 金币`);
    }
  });
}

document.getElementById('historyBtn').onclick = () => {
  const list = document.getElementById('historyList');
  if (player.history.length === 0) {
    list.innerHTML = '<p>暂无训练记录</p>';
  } else {
    list.innerHTML = player.history.map(h =>

    ).join('<hr>');
  }
  document.getElementById('historyModal').style.display = 'flex';
};

  const text = document.getElementById('docInput').value.trim();
  if (!text) return alert('请输入法律文本');
  alert('AI 生成功能需要接入 Gemini API，请配置 API Key');
};

document.getElementById('pdfUpload').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  script.onload = async () => {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    document.getElementById('docInput').value = text;
  };
  document.head.appendChild(script);
};

});
